name: release-please

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: existing release tag to (re)build assets for
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          release-type: go

  release-assets:
    needs: release-please
    if: always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install build and bundle deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev libsdl2-ttf-dev libturbojpeg0-dev libmpv-dev \
            libgphoto2-dev gphoto2 \
            cmake g++ libusb-1.0-0-dev libmagic-dev zlib1g-dev libssl-dev \
            libfuse2 file
      - name: build release binaries
        run: |
          mkdir -p dist
          # web binary and headless importer are pure Go: fully static
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" \
            -o dist/fuji-cull-linux-amd64 ./cmd/fuji-cull
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" \
            -o dist/fuji-import-linux-amd64 ./cmd/fuji-import
          # self-contained GUI: libraries and external tools bundled
          chmod +x scripts/build-appimage.sh && ./scripts/build-appimage.sh
          cp dist/appimage/*.AppImage dist/
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist/appimage
          gh release upload "${{ needs.release-please.outputs.tag_name || inputs.tag }}" dist/* --clobber

  release-assets-macos:
    needs: release-please
    if: always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install build deps
        run: brew install sdl2 sdl2_ttf jpeg-turbo mpv pkgconf cmake libusb gphoto2 libgphoto2 ffmpeg dylibbundler
      - name: build app bundle
        env:
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          export VERSION="${TAG#v}"
          chmod +x scripts/build-macos.sh && ./scripts/build-macos.sh
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name || inputs.tag }}" dist/macos/*.dmg --clobber

  release-assets-android:
    needs: release-please
    if: always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: install ndk
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;26.3.11579264" >/dev/null
      - name: gomobile bind (engine aar)
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.3.11579264
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          mkdir -p android/app/libs
          "$(go env GOPATH)/bin/gomobile" bind -target=android/arm64,android/amd64 -androidapi 29 \
            -o android/app/libs/engine.aar ./mobile
      - name: build patched aft for android
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.3.11579264
        run: |
          git clone https://github.com/whoozle/android-file-transfer-linux.git /tmp/aft
          git -C /tmp/aft checkout "$(cat $PWD/third_party/aft-partial/UPSTREAM_COMMIT)"
          git -C /tmp/aft apply "$PWD/third_party/aft-partial/partial-reads.patch"
          for abi in arm64-v8a x86_64; do
            cmake -S /tmp/aft -B "/tmp/aft/build-$abi" -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="$abi" -DANDROID_PLATFORM=android-29 \
              -DBUILD_QT_UI=OFF -DBUILD_FUSE=OFF -DBUILD_SHARED_LIB=OFF \
              -DCMAKE_DISABLE_FIND_PACKAGE_Readline=TRUE -DBUILD_TAGLIB=OFF
            cmake --build "/tmp/aft/build-$abi" -j"$(nproc)" --target aft-mtp-cli
            mkdir -p "android/app/src/main/jniLibs/$abi"
            cp "/tmp/aft/build-$abi/cli/aft-mtp-cli" "android/app/src/main/jniLibs/$abi/libaftcli.so"
          done
      - name: cache bundled ffmpeg
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: ffmpeg-android
          key: ffmpeg-n7.1-ndk-26.3.11579264-v2
      - name: build minimal ffmpeg (posters — decodes the 4:2:2 hevc no android codec can)
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.3.11579264
        run: |
          git clone --depth 1 --branch n7.1 https://git.ffmpeg.org/ffmpeg.git /tmp/ffm
          NDKBIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          for pair in aarch64:arm64-v8a x86_64:x86_64; do
            arch=${pair%%:*}; abi=${pair##*:}
            extra=""
            [ "$arch" = "x86_64" ] && extra="--disable-x86asm"
            cd /tmp/ffm && (make distclean >/dev/null 2>&1 || true)
            ./configure --cc="$NDKBIN/${arch}-linux-android29-clang" \
              --enable-cross-compile --target-os=android --arch=$arch \
              --disable-everything --disable-autodetect --disable-doc \
              --disable-ffplay --disable-ffprobe --disable-network --disable-debug \
              $extra --enable-small \
              --enable-decoder=hevc,h264 --enable-demuxer=mov \
              --enable-encoder=mjpeg --enable-muxer=image2 \
              --enable-filter=scale,format --enable-protocol=file --enable-swscale \
              --pkg-config=/bin/true >/dev/null
            make -j"$(nproc)" ffmpeg_g >/dev/null
            mkdir -p "$GITHUB_WORKSPACE/ffmpeg-android/$abi"
            "$NDKBIN/llvm-strip" ffmpeg_g -o "$GITHUB_WORKSPACE/ffmpeg-android/$abi/libffmpeg.so"
          done
      - name: bundle ffmpeg
        run: |
          for abi in arm64-v8a x86_64; do
            mkdir -p "android/app/src/main/jniLibs/$abi"
            cp "ffmpeg-android/$abi/libffmpeg.so" "android/app/src/main/jniLibs/$abi/"
          done
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: assemble apk
        run: |
          gradle -p android :app:assembleDebug
          cp android/app/build/outputs/apk/debug/app-debug.apk fuji-cull-android-arm64.apk
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name || inputs.tag }}" fuji-cull-android-arm64.apk --clobber

  release-assets-ios:
    needs: release-please
    if: always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install build deps
        run: brew install xcodegen
      - name: gomobile bind (engine xcframework)
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          gomobile bind -target=ios -o ios/Mobile.xcframework ./mobile
      - name: build unsigned ipa (sideload distribution)
        env:
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          export VERSION="${TAG#v}"
          chmod +x ios/make-ipa.sh && ./ios/make-ipa.sh
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name || inputs.tag }}" dist/FujiCull.ipa --clobber
      - name: update sidestore source feed
        env:
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          python3 - <<PY
          import json, os, datetime
          p = 'ios/sidestore-source.json'
          d = json.load(open(p))
          v = d['apps'][0]['versions']
          entry = {
            'version': os.environ['TAG'].lstrip('v'),
            'date': datetime.date.today().isoformat(),
            'localizedDescription': 'See https://github.com/zackpollard/fuji-cull/releases/tag/' + os.environ['TAG'],
            'downloadURL': 'https://github.com/zackpollard/fuji-cull/releases/download/' + os.environ['TAG'] + '/FujiCull.ipa',
            'size': os.path.getsize('dist/FujiCull.ipa'),
            'minOSVersion': '16.0',
          }
          v[:] = [entry] + [e for e in v if e['version'] != entry['version']]
          json.dump(d, open(p, 'w'), indent=2)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios/sidestore-source.json
          git commit -m "chore(ios): point sidestore source at ${TAG}" || exit 0
          git push origin HEAD:master
