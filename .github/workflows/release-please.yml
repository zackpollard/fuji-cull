name: release-please

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: existing release tag to (re)build assets for
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          release-type: go

  release-assets:
    needs: release-please
    if: always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install build and bundle deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev libsdl2-ttf-dev libturbojpeg0-dev libmpv-dev \
            libgphoto2-dev gphoto2 libimage-exiftool-perl \
            cmake g++ libusb-1.0-0-dev libmagic-dev zlib1g-dev libssl-dev \
            libfuse2 file
      - name: build release binaries
        run: |
          mkdir -p dist
          # web binary and headless importer are pure Go: fully static
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" \
            -o dist/fuji-cull-linux-amd64 ./cmd/fuji-cull
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" \
            -o dist/fuji-import-linux-amd64 ./cmd/fuji-import
          # self-contained GUI: libraries and external tools bundled
          chmod +x scripts/build-appimage.sh && ./scripts/build-appimage.sh
          cp dist/appimage/*.AppImage dist/
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist/appimage
          gh release upload "${{ needs.release-please.outputs.tag_name || inputs.tag }}" dist/* --clobber
