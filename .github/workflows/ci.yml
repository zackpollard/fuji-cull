name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install cgo system deps - sdl2, sdl2_ttf, libjpeg-turbo, libmpv
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev libsdl2-ttf-dev libturbojpeg0-dev libmpv-dev
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install build and bundle deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev libsdl2-ttf-dev libturbojpeg0-dev libmpv-dev \
            libgphoto2-dev gphoto2 \
            cmake g++ libusb-1.0-0-dev libmagic-dev zlib1g-dev libssl-dev \
            libfuse2 file
      - run: chmod +x scripts/build-appimage.sh && ./scripts/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: fuji-cull-gui-appimage
          path: dist/appimage/*.AppImage

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install build deps
        run: brew install sdl2 sdl2_ttf jpeg-turbo mpv pkgconf cmake libusb gphoto2 libgphoto2 ffmpeg dylibbundler
      - run: chmod +x scripts/build-macos.sh && ./scripts/build-macos.sh
      - name: tests
        run: |
          export CGO_CFLAGS="-I$(brew --prefix)/include"
          export CGO_LDFLAGS="-L$(brew --prefix)/lib"
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          go test ./internal/...
      - uses: actions/upload-artifact@v4
        with:
          name: fuji-cull-macos
          path: dist/macos/*.dmg

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: install ndk
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;26.3.11579264" >/dev/null
      - name: gomobile bind (engine aar)
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.3.11579264
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          mkdir -p android/app/libs
          "$(go env GOPATH)/bin/gomobile" bind -target=android/arm64,android/amd64 -androidapi 29 \
            -o android/app/libs/engine.aar ./mobile
      - name: build patched aft for android
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.3.11579264
        run: |
          git clone https://github.com/whoozle/android-file-transfer-linux.git /tmp/aft
          git -C /tmp/aft checkout "$(cat $PWD/third_party/aft-partial/UPSTREAM_COMMIT)"
          git -C /tmp/aft apply "$PWD/third_party/aft-partial/partial-reads.patch"
          for abi in arm64-v8a x86_64; do
            cmake -S /tmp/aft -B "/tmp/aft/build-$abi" -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="$abi" -DANDROID_PLATFORM=android-29 \
              -DBUILD_QT_UI=OFF -DBUILD_FUSE=OFF -DBUILD_SHARED_LIB=OFF \
              -DCMAKE_DISABLE_FIND_PACKAGE_Readline=TRUE -DBUILD_TAGLIB=OFF
            cmake --build "/tmp/aft/build-$abi" -j"$(nproc)" --target aft-mtp-cli
            mkdir -p "android/app/src/main/jniLibs/$abi"
            cp "/tmp/aft/build-$abi/cli/aft-mtp-cli" "android/app/src/main/jniLibs/$abi/libaftcli.so"
          done
      - name: cache bundled ffmpeg
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: ffmpeg-android
          key: ffmpeg-n7.1-ndk-26.3.11579264-v2
      - name: build minimal ffmpeg (posters — decodes the 4:2:2 hevc no android codec can)
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.3.11579264
        run: |
          git clone --depth 1 --branch n7.1 https://git.ffmpeg.org/ffmpeg.git /tmp/ffm
          NDKBIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          for pair in aarch64:arm64-v8a x86_64:x86_64; do
            arch=${pair%%:*}; abi=${pair##*:}
            extra=""
            [ "$arch" = "x86_64" ] && extra="--disable-x86asm"
            cd /tmp/ffm && (make distclean >/dev/null 2>&1 || true)
            ./configure --cc="$NDKBIN/${arch}-linux-android29-clang" \
              --enable-cross-compile --target-os=android --arch=$arch \
              --disable-everything --disable-autodetect --disable-doc \
              --disable-ffplay --disable-ffprobe --disable-network --disable-debug \
              $extra --enable-small \
              --enable-decoder=hevc,h264 --enable-demuxer=mov \
              --enable-encoder=mjpeg --enable-muxer=image2 \
              --enable-filter=scale,format --enable-protocol=file --enable-swscale \
              --pkg-config=/bin/true >/dev/null
            make -j"$(nproc)" ffmpeg_g >/dev/null
            mkdir -p "$GITHUB_WORKSPACE/ffmpeg-android/$abi"
            "$NDKBIN/llvm-strip" ffmpeg_g -o "$GITHUB_WORKSPACE/ffmpeg-android/$abi/libffmpeg.so"
          done
      - name: bundle ffmpeg
        run: |
          for abi in arm64-v8a x86_64; do
            mkdir -p "android/app/src/main/jniLibs/$abi"
            cp "ffmpeg-android/$abi/libffmpeg.so" "android/app/src/main/jniLibs/$abi/"
          done
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: assemble apk
        run: gradle -p android :app:assembleDebug
      - uses: actions/upload-artifact@v7
        with:
          name: fuji-cull-android
          path: android/app/build/outputs/apk/debug/*.apk
          # non-zipped: the apk downloads as a raw file straight from the run page
          archive: false
