name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install cgo system deps - sdl2, sdl2_ttf, libjpeg-turbo, libmpv
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev libsdl2-ttf-dev libturbojpeg0-dev libmpv-dev
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install build and bundle deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev libsdl2-ttf-dev libturbojpeg0-dev libmpv-dev \
            libgphoto2-dev gphoto2 libimage-exiftool-perl \
            cmake g++ libusb-1.0-0-dev libmagic-dev zlib1g-dev libssl-dev \
            libfuse2 file
      - run: chmod +x scripts/build-appimage.sh && ./scripts/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: fuji-cull-gui-appimage
          path: dist/appimage/*.AppImage

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install build deps
        run: brew install sdl2 sdl2_ttf jpeg-turbo mpv pkgconf cmake libusb gphoto2 libgphoto2 ffmpeg exiftool dylibbundler
      - run: chmod +x scripts/build-macos.sh && ./scripts/build-macos.sh
      - name: tests
        run: |
          export CGO_CFLAGS="-I$(brew --prefix)/include"
          export CGO_LDFLAGS="-L$(brew --prefix)/lib"
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          go test ./internal/...
      - uses: actions/upload-artifact@v4
        with:
          name: fuji-cull-macos
          path: dist/macos/*.dmg
