<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; width:100%; height:100%; aspect-ratio:1/1; background:#161815; overflow:hidden; border-radius:2px; font-family:'IBM Plex Mono',ui-monospace,monospace; user-select:none;">
  <sc-if value="{{ isLoaded }}" hint-placeholder-val="{{ true }}">
    <sc-if value="{{ hasSrc }}" hint-placeholder-val="{{ false }}">
      <img src="{{ src }}" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;" />
    </sc-if>
    <sc-if value="{{ noImg }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute; inset:0; background:{{ bg }};"></div>
    </sc-if>
  </sc-if>
  <sc-if value="{{ isPending }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; inset:0; background:repeating-linear-gradient(135deg,#141613 0 7px,#191c17 7px 14px);"></div>
    <div style="position:absolute; inset:0; background:linear-gradient(100deg,transparent 30%,rgba(255,179,46,0.07) 50%,transparent 70%); background-size:220% 100%; animation:tileShimmer 1.5s linear infinite;"></div>
  </sc-if>
  <sc-if value="{{ isFailed }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#131512; color:#6B6E62; font-size:18px; font-weight:500;">&#215;</div>
  </sc-if>

  <div style="position:absolute; top:5px; right:5px; display:flex; gap:5px; align-items:center;">
    <sc-if value="{{ immich }}" hint-placeholder-val="{{ false }}">
      <div style="width:9px; height:9px; border-radius:50%; border:2px solid #57C9C1; box-shadow:0 0 0 1px rgba(11,12,11,0.6);"></div>
    </sc-if>
    <sc-if value="{{ buffered }}" hint-placeholder-val="{{ false }}">
      <div style="width:9px; height:9px; border-radius:50%; background:#4EA6FF; box-shadow:0 0 0 1px rgba(11,12,11,0.6);"></div>
    </sc-if>
  </div>

  <sc-if value="{{ raw }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; top:4px; left:4px; font:600 8px/1 'IBM Plex Mono',monospace; letter-spacing:0.06em; color:#ECE9E0; background:rgba(11,12,11,0.72); padding:2px 3px; border-radius:2px;">RAF</div>
  </sc-if>

  <sc-if value="{{ video }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;">
      <div style="width:28px; height:28px; border-radius:50%; background:rgba(11,12,11,0.5); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center;">
        <div style="width:0; height:0; border-style:solid; border-width:5px 0 5px 9px; border-color:transparent transparent transparent #ECE9E0; margin-left:2px;"></div>
      </div>
    </div>
  </sc-if>

  <sc-if value="{{ hasLabel }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; left:0; right:0; bottom:0; padding:16px 5px 6px; background:linear-gradient(transparent,rgba(11,12,11,0.8)); font-size:9px; letter-spacing:0.02em; color:#ECE9E0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ label }}</div>
  </sc-if>

  <div style="position:absolute; left:0; right:0; bottom:0; height:{{ barH }}; background:{{ barColor }};"></div>

  <sc-if value="{{ cursor }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; inset:0; outline:2px solid #FFB32E; outline-offset:-2px; box-shadow:0 0 0 1px rgba(11,12,11,0.6) inset, 0 0 14px rgba(255,179,46,0.28); pointer-events:none;"></div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:150,&quot;height&quot;:150},&quot;src&quot;:{&quot;editor&quot;:null,&quot;default&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;bg&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;linear-gradient(135deg,#2a3022,#14130e)&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;decision&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;&quot;,&quot;keep&quot;,&quot;reject&quot;],&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;state&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;loaded&quot;,&quot;pending&quot;,&quot;failed&quot;],&quot;default&quot;:&quot;loaded&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;buffered&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;immich&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;video&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;raw&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;cursor&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const decision = p.decision || '';
    let barColor = 'rgba(255,255,255,0.08)', barH = '3px';
    if (decision === 'keep') { barColor = '#38D67A'; barH = '6px'; }
    else if (decision === 'reject') { barColor = '#FF5A3D'; barH = '6px'; }
    const state = p.state || 'loaded';
    const src = p.src || '';
    const hasSrc = !!src;
    return {
      src, hasSrc, noImg: !hasSrc,
      bg: p.bg || 'linear-gradient(135deg,#2a3022,#14130e)',
      barColor, barH,
      isLoaded: state === 'loaded', isPending: state === 'pending', isFailed: state === 'failed',
      buffered: !!p.buffered, immich: !!p.immich, video: !!p.video, raw: !!p.raw, cursor: !!p.cursor,
      label: p.label || '', hasLabel: !!p.label,
    };
  }
}
</script>
</body>
</html>
