<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fuji-cull</title>
<style>
  :root {
    --bg: #0b0c0b;
    --panel: #121412;
    --line: #232623;
    --fg: #e8e6df;
    --dim: #7d817b;
    --keep: #37d67a;
    --keep-dim: #1d5c38;
    --reject: #ff5a3c;
    --reject-dim: #6b2417;
    --amber: #ffb42e;
    --buffered: #2f7fe0; /* downloaded to NVMe buffer */
    --decoded: #2de0c8;  /* decoded in browser, instant to show */
    --mono: "Iosevka", "JetBrainsMono Nerd Font", "JetBrains Mono", "Cascadia Code", ui-monospace, "SF Mono", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 13px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── top viewfinder strip ─────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    user-select: none;
    white-space: nowrap;
  }
  header .brand { letter-spacing: .18em; color: var(--dim); }
  header .brand b { color: var(--fg); font-weight: 600; }
  header .file { flex: 1; text-align: center; color: var(--fg); overflow: hidden; text-overflow: ellipsis; }
  header .file .folder { color: var(--dim); }
  .counter { color: var(--dim); }
  .counter b { color: var(--fg); font-weight: 600; }
  .tally { display: flex; gap: 14px; }
  .tally .k { color: var(--keep); }
  .tally .r { color: var(--reject); }
  .tally .u { color: var(--dim); }
  button.import {
    font: inherit; letter-spacing: .12em;
    background: none; color: var(--amber);
    border: 1px solid var(--amber);
    padding: 4px 14px; cursor: pointer;
  }
  button.import:hover { background: var(--amber); color: #14100a; }

  /* ── stage / viewer ───────────────────────────────────── */
  main { position: relative; flex: 1; min-height: 0; background: #000; }
  #stage {
    position: absolute; inset: 10px;
    overflow: hidden;
    border: 1px solid transparent;
    transition: border-color .12s;
    touch-action: none;
  }
  #stage.keep   { border-color: var(--keep); }
  #stage.reject { border-color: var(--reject); }
  #stage.zoomed { cursor: grab; }
  #stage.panning { cursor: grabbing; }
  /* Photos render into a viewport-sized canvas from ImageBitmaps we own —
     no giant <img> layers, no decode-cache eviction, atomic frame swaps. */
  #cv { position: absolute; inset: 0; width: 100%; height: 100%; }
  #view { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  #view video { position: absolute; inset: 0; width: 100%; height: 100%; outline: none; pointer-events: auto; }

  .badge {
    position: absolute; top: 22px; left: 22px;
    padding: 3px 12px; letter-spacing: .22em; font-weight: 600;
    display: none; pointer-events: none; z-index: 3;
  }
  .badge.keep   { display: block; color: #06130b; background: var(--keep); }
  .badge.reject { display: block; color: #180703; background: var(--reject); }
  .zoomtag {
    position: absolute; top: 22px; right: 22px;
    color: var(--amber); letter-spacing: .2em; display: none;
    pointer-events: none; z-index: 3;
  }
  #overlay {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center; flex-direction: column; gap: 10px;
    color: var(--dim); letter-spacing: .25em; text-align: center;
    background: rgba(11,12,11,.55); z-index: 2;
  }
  #overlay.show { display: flex; }
  #overlay .blink { animation: blink 1.1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .25; } }
  #overlay .err { color: var(--reject); letter-spacing: .08em; max-width: 70ch; }

  /* ── filmstrip ────────────────────────────────────────── */
  #strip {
    display: flex; gap: 2px; align-items: flex-end;
    padding: 8px 14px 4px;
    overflow-x: auto; scrollbar-width: none;
    background: var(--panel);
    border-top: 1px solid var(--line);
    user-select: none;
    position: relative; /* anchors the #stripCursor overlay */
  }
  #strip::-webkit-scrollbar { display: none; }
  .tick {
    flex: 0 0 24px; height: 38px;
    background: #1d201d;
    border: none; padding: 0; cursor: pointer;
    position: relative; overflow: hidden;
    contain: layout paint; /* a tick's changes never relayout the strip */
  }
  .tick img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; pointer-events: none;
  }
  .tick.keep   { background: var(--keep-dim); }
  .tick.reject { background: var(--reject-dim); }
  .tick.reject img { opacity: .35; filter: grayscale(.6); }
  /* decision bar along the bottom (drawn above the thumbnail) */
  .tick.keep::after, .tick.reject::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 3px; z-index: 2;
  }
  .tick.keep::after   { background: var(--keep); }
  .tick.reject::after { background: var(--reject); }
  /* pipeline stripe along the top: blue = downloaded, cyan = decoded; videos
     amber. Saturated hues + a dark hairline keep them legible over thumbnails. */
  .tick.buffered::before, .tick.decoded::before, .tick.video::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 2;
    box-shadow: 0 1px 0 rgba(0, 0, 0, .55);
  }
  .tick.buffered::before { background: var(--buffered); }
  .tick.decoded::before  { background: var(--decoded); }
  .tick.video::before    { background: var(--amber); }
  /* The current marker is a single overlay moved by transform: any per-tick
     class change on navigation invalidates styles across the 19k-item strip
     (~40 ms paid at the next forced layout flush). */
  #stripCursor {
    position: absolute; top: 6px; height: 38px; width: 24px; left: 14px;
    outline: 2px solid var(--fg); outline-offset: 1px;
    pointer-events: none; z-index: 4;
  }

  footer {
    display: flex; gap: 20px; justify-content: center;
    padding: 5px 14px 8px; background: var(--panel);
    color: var(--dim); letter-spacing: .06em; user-select: none;
    white-space: nowrap; overflow: hidden;
  }
  footer b { color: var(--fg); font-weight: 600; }

  /* ── import panel ─────────────────────────────────────── */
  #importPanel {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,.72); z-index: 10;
  }
  #importPanel.show { display: flex; }
  #importPanel .box {
    background: var(--panel); border: 1px solid var(--line);
    padding: 26px 30px; min-width: 460px; max-width: 640px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #importPanel h2 { font-size: 13px; letter-spacing: .25em; color: var(--amber); font-weight: 600; }
  #importPanel .row { display: flex; justify-content: space-between; gap: 16px; color: var(--dim); }
  #importPanel .row b { color: var(--fg); font-weight: 600; text-align: right; word-break: break-all; }
  #importPanel label { display: flex; flex-direction: column; gap: 5px; color: var(--dim); letter-spacing: .08em; }
  #importPanel input {
    font: inherit; color: var(--fg); background: var(--bg);
    border: 1px solid var(--line); padding: 7px 9px;
  }
  #importPanel input:focus { outline: 1px solid var(--amber); }
  #importPanel .actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 4px; }
  #importPanel button {
    font: inherit; letter-spacing: .12em; cursor: pointer;
    background: none; border: 1px solid var(--dim); color: var(--dim); padding: 6px 18px;
  }
  #importPanel button.primary { border-color: var(--keep); color: var(--keep); }
  #importPanel button.primary:hover { background: var(--keep); color: #06130b; }
  #importPanel button:hover { border-color: var(--fg); color: var(--fg); }
  #importPanel .progress { display: none; flex-direction: column; gap: 8px; }
  #importPanel .progress.show { display: flex; }
  #importPanel .bar { height: 6px; background: var(--bg); border: 1px solid var(--line); }
  #importPanel .bar i { display: block; height: 100%; background: var(--keep); width: 0; transition: width .3s; }
  #importPanel .phase { color: var(--amber); letter-spacing: .15em; }
  #importPanel .error { color: var(--reject); word-break: break-word; }

  #perfHud {
    position: absolute; top: 8px; left: 12px; z-index: 30;
    background: rgba(11,12,11,.85); border: 1px solid var(--line);
    padding: 6px 10px; font-size: 11px; line-height: 1.5;
    color: var(--decoded); white-space: pre; display: none; pointer-events: none;
  }
  #toast {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--reject); color: #180703; padding: 6px 16px;
    letter-spacing: .05em; display: none; z-index: 20; max-width: 80vw;
  }
  #toast.show { display: block; }

  /* ── full-screen grid timeline ────────────────────────── */
  #grid {
    position: absolute; inset: 0; display: none;
    overflow-y: auto; background: var(--bg); z-index: 5;
    padding: 10px;
  }
  #grid.show { display: block; }
  #grid .cells {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 4px;
  }
  .cell {
    position: relative; aspect-ratio: 3/2;
    background: #161816; cursor: pointer;
    content-visibility: auto; contain-intrinsic-size: 110px 74px;
    overflow: hidden;
  }
  .cell img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; pointer-events: none;
  }
  .cell.reject img { opacity: .3; filter: grayscale(.7); }
  .cell.keep::after, .cell.reject::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 4px; z-index: 2;
  }
  .cell.keep::after   { background: var(--keep); }
  .cell.reject::after { background: var(--reject); }
  .cell.video::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--amber); z-index: 2;
  }
  .cell.current { outline: 2px solid var(--fg); outline-offset: -2px; }
  button.grid-toggle {
    font: inherit; letter-spacing: .12em;
    background: none; color: var(--dim);
    border: 1px solid var(--line);
    padding: 4px 14px; cursor: pointer;
  }
  button.grid-toggle:hover, button.grid-toggle.active { color: var(--fg); border-color: var(--dim); }
</style>
</head>
<body>
  <header>
    <span class="brand"><b>FUJI</b> CULL</span>
    <span class="counter" id="counter">—</span>
    <span class="file" id="filename">loading…</span>
    <span class="tally">
      <span class="k" id="cKeep">K 0</span>
      <span class="r" id="cReject">X 0</span>
      <span class="u" id="cUndecided">· 0</span>
    </span>
    <span class="counter" id="thumbProg" title="thumbnail sweep progress"></span>
    <button class="grid-toggle" id="gridBtn">GRID</button>
    <button class="import" id="importBtn">IMPORT</button>
  </header>

  <main>
    <div id="stage"><canvas id="cv"></canvas><div id="view"></div></div>
    <div class="badge" id="badge"></div>
    <div class="zoomtag" id="zoomtag">100%</div>
    <div id="overlay"><div class="blink" id="ovMsg">BUFFERING</div><div class="err" id="ovErr"></div></div>

    <div id="importPanel">
      <div class="box">
        <h2>IMPORT KEEPERS</h2>
        <div class="row"><span>shots marked keep</span><b id="impShots">0</b></div>
        <div class="row"><span>files (RAF+JPG+video)</span><b id="impFiles">0</b></div>
        <div class="row"><span>total size</span><b id="impSize">0</b></div>
        <label>destination directory
          <input id="impDest" placeholder="/mnt/skynas/…" spellcheck="false">
        </label>
        <label>immich album (optional)
          <input id="impAlbum" placeholder="Trip 2026" spellcheck="false">
        </label>
        <div class="progress" id="impProgress">
          <span class="phase" id="impPhase">COPY</span>
          <div class="bar"><i id="impBar"></i></div>
          <span class="row"><span id="impCount">0 / 0</span></span>
          <span class="error" id="impError"></span>
        </div>
        <div class="actions">
          <button id="impClose">CLOSE</button>
          <button class="primary" id="impGo">START IMPORT</button>
        </div>
      </div>
    </div>

    <div id="grid"><div class="cells" id="gridCells"></div></div>

    <div id="perfHud"></div>
    <div id="toast"></div>
  </main>

  <div id="strip"></div>
  <footer>
    <span><b>←→</b> navigate</span>
    <span><b>K</b> keep</span>
    <span><b>X</b> reject</span>
    <span><b>C</b> clear</span>
    <span><b>U</b> undo</span>
    <span><b>T</b> grid</span>
    <span><b>scroll/pinch</b> zoom</span>
    <span><b>Z</b> 1:1</span>
    <span><b>G</b> next undecided</span>
    <span><b>L</b> load video</span>
    <span><b>R</b> retry</span>
    <span><b>I</b> import</span>
  </footer>

<script>
"use strict";
const $ = id => document.getElementById(id);

let shots = [], decisions = {}, fetchStates = {}, cursor = 0;
let undoStack = [], importStatus = {}, videoDirect = false;
let ticks = [];
const idIndex = new Map(); // shot ID -> position

const imgURL = id => "/api/image?id=" + encodeURIComponent(id);
const vidURL = id => "/api/video?id=" + encodeURIComponent(id);

function humanSize(n) {
  if (!n) return "";
  if (n > 1e9) return (n / 1e9).toFixed(2) + " GB";
  if (n > 1e6) return (n / 1e6).toFixed(1) + " MB";
  return Math.round(n / 1e3) + " kB";
}

async function api(path, body) {
  const res = await fetch(path, body === undefined ? {} : {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(await res.text());
  const ct = res.headers.get("Content-Type") || "";
  return ct.includes("json") ? res.json() : null;
}

let toastTimer;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 4000);
}

/* ── media pool: worker-side fetch + decode ────────────────────
   All image work happens in a Web Worker, strictly one image at a time:
   fetch (the server long-polls until the shot is buffered), decode, and
   creation of two ImageBitmaps — full resolution for zoom plus a stage-sized
   one so the common fit view draws as a ~1:1 blit. Bitmaps transfer to the
   main thread ready to draw; nothing heavy ever touches the main thread. */
const pool = new Map(); // shot ID -> {id, status, full, fitBm, fullW, fullH, promise, resolve, reject}
const decodedIds = new Set(); // shots with bitmaps ready in the browser

const workerSrc = `
let busy = false;
const queue = [];
self.onmessage = (ev) => { queue.push(ev.data); pump(); };
async function pump() {
  if (busy) return;
  const job = queue.shift();
  if (!job) return;
  busy = true;
  try {
    const t0 = performance.now();
    const res = await fetch(job.url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const blob = await res.blob();
    const t1 = performance.now();
    // Decode EXACTLY once; derive the fit bitmap from the decoded full via
    // a resize createImageBitmap (no re-decode from source pixels) — the
    // blob-with-resize path decodes the JPEG a second time.
    const full = await createImageBitmap(blob);
    const t2 = performance.now();
    const s = Math.min(job.fitW / full.width, job.fitH / full.height, 1);
    const w = Math.max(1, Math.round(full.width * s)), h = Math.max(1, Math.round(full.height * s));
    let fit = null;
    try {
      fit = await createImageBitmap(full, { resizeWidth: w, resizeHeight: h, resizeQuality: "high" });
      if (Math.abs(fit.width - w) > 2) { fit.close(); fit = null; }
    } catch (e) { fit = null; }
    if (!fit) {
      const oc = new OffscreenCanvas(w, h);
      const cx = oc.getContext("2d");
      cx.imageSmoothingEnabled = true;
      cx.imageSmoothingQuality = "high";
      cx.drawImage(full, 0, 0, w, h);
      fit = oc.transferToImageBitmap();
    }
    const t3 = performance.now();
    self.postMessage({
      id: job.id, full, fit,
      timing: { fetch: Math.round(t1 - t0), decode: Math.round(t2 - t1), fit: Math.round(t3 - t2) },
    }, [full, fit]);
  } catch (err) {
    self.postMessage({ id: job.id, error: String(err) });
  }
  busy = false;
  pump();
}
`;
const imgWorker = new Worker(URL.createObjectURL(new Blob([workerSrc], { type: "text/javascript" })));
let workerInflight = 0;
const workerQueue = []; // ids waiting to be sent, priority order

imgWorker.onmessage = (ev) => {
  workerInflight--;
  const { id, full, fit, error } = ev.data;
  if (ev.data.timing) perfStats.jobs.push(ev.data.timing);
  const e = pool.get(id);
  if (!e || e.status === "ready") {
    if (full) full.close();
    if (fit) fit.close();
  } else if (error) {
    e.status = "failed";
    e.reject(new Error(error));
    // Don't cache the failure: forget the entry so navigation/preload retries.
    setTimeout(() => { if (pool.get(id) === e) pool.delete(id); }, 5000);
  } else {
    e.full = full;
    e.fitBm = fit;
    e.fullW = full.width;
    e.fullH = full.height;
    e.status = "ready";
    decodedIds.add(id);
    e.resolve(e);
    decorate();
  }
  pumpWorker();
  preload(); // a slot freed: keep the pipeline full
};

function pumpWorker() {
  // One image in flight: decoding several 26 MP frames concurrently pins the
  // CPU (and in Firefox can serialize onto the main thread's compositor).
  while (workerInflight < 1 && workerQueue.length) {
    const id = workerQueue.shift();
    const e = pool.get(id);
    if (!e || e.status !== "queued") continue;
    e.status = "loading";
    const [sw, sh] = stageSize();
    const d = dpr();
    workerInflight++;
    imgWorker.postMessage({
      // blob-URL workers cannot resolve relative URLs — absolutize here
      id, url: new URL(imgURL(id), location.href).href,
      fitW: Math.max(64, Math.round(sw * d)),
      fitH: Math.max(64, Math.round(sh * d)),
    });
  }
}

// entryFor queues a shot for loading; front=true puts it next in line.
function entryFor(id, front = false) {
  let e = pool.get(id);
  if (!e) {
    e = { id, status: "queued", full: null, fitBm: null, fullW: 0, fullH: 0 };
    e.promise = new Promise((res, rej) => { e.resolve = res; e.reject = rej; });
    e.promise.catch(() => {}); // avoid unhandled-rejection noise for preloads
    pool.set(id, e);
    if (front) workerQueue.unshift(id); else workerQueue.push(id);
  } else if (front && e.status === "queued") {
    const i = workerQueue.indexOf(id);
    if (i > 0) { workerQueue.splice(i, 1); workerQueue.unshift(id); }
  }
  pumpWorker();
  return e;
}

function prunePool() {
  for (const [id, e] of pool) {
    const i = idIndex.get(id);
    const d = i === undefined ? 9999 : i - cursor;
    if (d < -KEEP_MARGIN || d > KEEP_MARGIN) {
      const qi = workerQueue.indexOf(id);
      if (qi >= 0) workerQueue.splice(qi, 1);
      if (e.status === "loading") continue; // let the worker finish; result is discarded if pruned later
      if (e.full && e.full !== viewer.full) e.full.close();
      if (e.fitBm && e.fitBm !== viewer.fitBm) e.fitBm.close();
      pool.delete(id);
      decodedIds.delete(id);
    }
  }
}

const DECODE_AHEAD = 10;
const KEEP_MARGIN = 12; // full-res ImageBitmaps are ~100 MB each; ±12 ≈ 2.5 GB

function preload() {
  // Queue the window around the cursor, nearest-first with a forward bias.
  for (let d = 1; d <= DECODE_AHEAD; d++) {
    for (const i of [cursor + d, cursor - d]) {
      if (i < 0 || i >= shots.length) continue;
      if (shots[i].kind !== "photo") continue;
      entryFor(shots[i].id);
    }
  }
}

/* ── viewer: canvas + ImageBitmap ─────────────────────────────
   Photos draw into a viewport-sized canvas from ImageBitmaps the app owns.
   Old frame persists until the new drawImage lands — atomic swaps, no
   underlays, no decode-cache eviction, identical in Firefox and Chromium. */
const viewer = { full: null, fitBm: null, natW: 0, natH: 0, scale: 1, tx: 0, ty: 0, fit: 1 };
let gestureActive = 0; // >0 during wheel/pan bursts: draw fast, refine after
let zoomMem = null; // {scale, cx, cy, aspect} — reapplied while aspect matches
let drawPending = false;

function dpr() { return window.devicePixelRatio || 1; }

function stageSize() {
  const r = $("stage").getBoundingClientRect();
  return [r.width, r.height];
}

function resizeCanvas() {
  const cv = $("cv");
  const [sw, sh] = stageSize();
  const w = Math.round(sw * dpr()), h = Math.round(sh * dpr());
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
}

function draw() {
  const __t0 = debugOn ? performance.now() : 0;
  const cv = $("cv");
  const ctx = cv.getContext("2d");
  try {
    drawInner(cv, ctx);
  } finally {
    if (debugOn) { perfStats.draws.push(performance.now() - __t0); if (perfStats.draws.length > 200) perfStats.draws.splice(0, 100); }
  }
}

function drawInner(cv, ctx) {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, cv.width, cv.height);
  if (!viewer.full) return;
  const d = dpr();
  // Near fit scale, blit the pre-scaled bitmap ~1:1 — scaling the 26 MP
  // original per draw costs ~100 ms/frame on the main thread in software
  // rendering. The full bitmap is only sampled when zoomed in (small crop).
  if (viewer.fitBm && viewer.scale <= viewer.fit * 1.02) {
    const s = viewer.scale * (viewer.natW / viewer.fitBm.width);
    ctx.setTransform(s * d, 0, 0, s * d, viewer.tx * d, viewer.ty * d);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "medium";
    ctx.drawImage(viewer.fitBm, 0, 0);
    return;
  }
  ctx.setTransform(viewer.scale * d, 0, 0, viewer.scale * d, viewer.tx * d, viewer.ty * d);
  ctx.imageSmoothingEnabled = !gestureActive; // fast during gestures, refined after
  ctx.imageSmoothingQuality = "medium";
  ctx.drawImage(viewer.full, 0, 0);
}

// bumpGesture marks an interactive zoom/pan burst; when it ends, one more
// draw runs with filtering on to refine the frame.
let gestureTimer = null;
function bumpGesture() {
  gestureActive = 1;
  clearTimeout(gestureTimer);
  gestureTimer = setTimeout(() => { gestureActive = 0; scheduleDraw(); }, 160);
}

function scheduleDraw() {
  if (drawPending) return;
  drawPending = true;
  requestAnimationFrame(() => { drawPending = false; draw(); });
}

function mountEntry(e) {
  resizeCanvas();
  viewer.full = e.full;
  viewer.fitBm = e.fitBm;
  viewer.natW = e.fullW;
  viewer.natH = e.fullH;
  const [sw, sh] = stageSize();
  viewer.fit = Math.min(sw / viewer.natW, sh / viewer.natH, 1);
  const aspect = viewer.natW / viewer.natH;
  if (zoomMem && Math.abs(zoomMem.aspect - aspect) < 0.01) {
    viewer.scale = Math.max(viewer.fit, Math.min(8, zoomMem.scale));
    viewer.tx = sw / 2 - zoomMem.cx * viewer.natW * viewer.scale;
    viewer.ty = sh / 2 - zoomMem.cy * viewer.natH * viewer.scale;
  } else {
    zoomMem = null;
    viewer.scale = viewer.fit;
  }
  clampPan();
  applyTransform();
  draw(); // synchronous first paint: the frame swap is atomic
}

function clampPan() {
  const [sw, sh] = stageSize();
  const w = viewer.natW * viewer.scale, h = viewer.natH * viewer.scale;
  viewer.tx = w <= sw ? (sw - w) / 2 : Math.min(0, Math.max(sw - w, viewer.tx));
  viewer.ty = h <= sh ? (sh - h) / 2 : Math.min(0, Math.max(sh - h, viewer.ty));
}

function zoomedIn() { return viewer.full && viewer.scale > viewer.fit + 1e-4; }

function applyTransform() {
  const z = zoomedIn();
  $("zoomtag").style.display = z ? "block" : "none";
  $("zoomtag").textContent = Math.round(viewer.scale * 100) + "%";
  $("stage").classList.toggle("zoomed", !!z);
  // Remember zoom so the next same-aspect photo opens identically.
  if (z) {
    const [sw, sh] = stageSize();
    zoomMem = {
      scale: viewer.scale,
      cx: (sw / 2 - viewer.tx) / viewer.scale / viewer.natW,
      cy: (sh / 2 - viewer.ty) / viewer.scale / viewer.natH,
      aspect: viewer.natW / viewer.natH,
    };
  } else {
    zoomMem = null;
  }
  scheduleDraw();
}

function zoomAt(px, py, newScale) {
  if (!viewer.full) return;
  newScale = Math.max(viewer.fit, Math.min(8, newScale));
  const ix = (px - viewer.tx) / viewer.scale, iy = (py - viewer.ty) / viewer.scale;
  viewer.tx = px - ix * newScale;
  viewer.ty = py - iy * newScale;
  viewer.scale = newScale;
  clampPan();
  applyTransform();
}

function toggleZoom(px, py) {
  if (!viewer.full) return;
  const [sw, sh] = stageSize();
  zoomAt(px === undefined ? sw / 2 : px, py === undefined ? sh / 2 : py,
    zoomedIn() ? viewer.fit : 1);
}

(() => {
  const stage = $("stage");
  // Never let the browser start a native image drag-and-drop: it swallows
  // pointer events and makes panning impossible (esp. Firefox).
  stage.addEventListener("dragstart", e => e.preventDefault());
  stage.addEventListener("wheel", e => {
    if (!viewer.full) return;
    bumpGesture();
    e.preventDefault();
    const r = stage.getBoundingClientRect();
    // ctrl+wheel is what browsers deliver for trackpad pinch
    const k = e.ctrlKey ? 0.01 : 0.002;
    zoomAt(e.clientX - r.left, e.clientY - r.top, viewer.scale * Math.exp(-e.deltaY * k));
  }, { passive: false });

  const pointers = new Map();
  let pinch = null, pan = null;
  stage.addEventListener("pointerdown", e => {
    if (!viewer.full) return;
    e.preventDefault(); // no text selection / native drag initiation
    try { stage.setPointerCapture(e.pointerId); } catch (err) { /* capture is best-effort */ }
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      pinch = { dist: Math.hypot(a.x - b.x, a.y - b.y), scale: viewer.scale };
      pan = null;
    } else if (pointers.size === 1 && zoomedIn()) {
      pan = { x: e.clientX, y: e.clientY, tx: viewer.tx, ty: viewer.ty };
      stage.classList.add("panning");
    }
  });
  stage.addEventListener("pointermove", e => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pinch && pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      const r = stage.getBoundingClientRect();
      const nd = Math.hypot(a.x - b.x, a.y - b.y);
      zoomAt((a.x + b.x) / 2 - r.left, (a.y + b.y) / 2 - r.top, pinch.scale * nd / pinch.dist);
    } else if (pan) {
      bumpGesture();
      viewer.tx = pan.tx + (e.clientX - pan.x);
      viewer.ty = pan.ty + (e.clientY - pan.y);
      clampPan();
      applyTransform();
    }
  });
  const end = e => {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinch = null;
    if (pointers.size === 0) { pan = null; stage.classList.remove("panning"); }
  };
  stage.addEventListener("pointerup", end);
  stage.addEventListener("pointercancel", end);
  stage.addEventListener("dblclick", e => {
    const r = stage.getBoundingClientRect();
    toggleZoom(e.clientX - r.left, e.clientY - r.top);
  });
  window.addEventListener("resize", () => {
    resizeCanvas();
    if (!viewer.full) { scheduleDraw(); return; }
    const [sw, sh] = stageSize();
    viewer.fit = Math.min(sw / viewer.natW, sh / viewer.natH, 1);
    viewer.scale = Math.max(viewer.fit, viewer.scale);
    clampPan();
    applyTransform();
  });
})();

/* ── perf HUD (open with ?debug=1) ───────────────────────── */
const perfStats = { jobs: [], draws: [], stalls: 0, maxStall: 0 };
const debugOn = location.search.includes("debug");
if (debugOn) {
  // Event-loop stall detector: works in Firefox too (no longtask API needed).
  let lastBeat = performance.now();
  setInterval(() => {
    const now = performance.now();
    const gap = now - lastBeat - 200;
    if (gap > 80) { perfStats.stalls++; perfStats.maxStall = Math.max(perfStats.maxStall, Math.round(gap)); }
    lastBeat = now;
  }, 200);
  setInterval(() => {
    const hud = $("perfHud");
    hud.style.display = "block";
    const j = perfStats.jobs.slice(-20);
    const avg = (arr, k) => arr.length ? Math.round(arr.reduce((a, x) => a + x[k], 0) / arr.length) : 0;
    const d = perfStats.draws.slice(-50);
    const davg = d.length ? (d.reduce((a, x) => a + x, 0) / d.length).toFixed(1) : "0";
    const dmax = d.length ? Math.max(...d).toFixed(1) : "0";
    hud.textContent =
      "worker avg ms  fetch " + avg(j, "fetch") + "  decode " + avg(j, "decode") + "  fit " + avg(j, "fit") + "  (" + perfStats.jobs.length + " imgs)\n" +
      "draw ms  avg " + davg + "  max " + dmax + "\n" +
      "main-thread stalls >80ms: " + perfStats.stalls + "  worst " + perfStats.maxStall + "ms";
  }, 1000);
}

/* ── boot ─────────────────────────────────────────────────── */
async function boot() {
  // The server binds before camera discovery finishes: show live progress
  // until /api/state stops reporting `discovering`.
  let st = null;
  for (;;) {
    try { st = await api("/api/state"); } catch (e) { st = null; }
    if (st && !st.discovering) break;
    $("overlay").classList.add("show");
    $("ovErr").style.color = "var(--dim)";
    if (st && st.error) {
      $("ovMsg").textContent = "DISCOVERY FAILED";
      $("ovErr").style.color = "";
      $("ovErr").textContent = st.error + " — check the camera and restart fuji-cull";
      return;
    }
    $("ovMsg").textContent = "READING CAMERA INDEX";
    $("ovErr").textContent = !st ? "connecting…"
      : (st.stage || "starting…") + (st.files ? " · " + st.files.toLocaleString() + " files" : "");
    await new Promise(r => setTimeout(r, 700));
  }
  $("overlay").classList.remove("show");
  $("ovErr").textContent = "";
  $("ovErr").style.color = "";
  shots = st.shots; decisions = st.decisions || {}; cursor = st.cursor || 0;
  importStatus = st.import || {}; videoDirect = !!st.videoDirect;
  shots.forEach((s, i) => idIndex.set(s.id, i));
  $("impDest").value = st.dest || "";
  $("impAlbum").value = st.album || "";
  buildStrip();
  resizeCanvas();
  show(cursor, false);
  setInterval(poll, 800);
  poll();
  syncThumbs();
}

/* Timeline thumbnails trickle in from the camera whenever the link is idle;
   sync availability and attach lazy <img>s to strip ticks and grid cells. */
let thumbStates = "";

function thumbImg(i) {
  const im = document.createElement("img");
  im.loading = "lazy";
  im.decoding = "async";
  im.alt = "";
  im.src = "/api/thumb?id=" + encodeURIComponent(shots[i].id);
  return im;
}

function attachThumb(i) {
  if (ticks[i] && !ticks[i].querySelector("img")) ticks[i].appendChild(thumbImg(i));
  if (cells[i] && !cells[i].querySelector("img")) cells[i].appendChild(thumbImg(i));
}

async function syncThumbs() {
  let s = "";
  try {
    const t = await api("/api/thumbs");
    s = t.states || "";
    for (let i = 0; i < s.length; i++) {
      if (s[i] === "1" && thumbStates[i] !== "1") attachThumb(i);
    }
    thumbStates = s;
    const eligible = s.length - (s.match(/-/g) || []).length;
    $("thumbProg").textContent = t.have < eligible ? "TH " + t.have + "/" + eligible : "";
  } catch (e) { /* transient */ }
  if (!s || s.includes("0")) setTimeout(syncThumbs, gridOpen ? 2000 : 4000);
}

/* ── full-screen grid timeline ────────────────────────────── */
let gridOpen = false, cells = [], gridColsCache = 0;

function buildGrid() {
  if (cells.length) return;
  const frag = document.createDocumentFragment();
  cells = shots.map((s, i) => {
    const c = document.createElement("div");
    c.className = "cell" + (s.kind === "video" ? " video" : "");
    c.title = s.folder + "/" + s.base;
    c.onclick = () => nav(i);
    c.ondblclick = () => { nav(i); toggleGrid(false); };
    if (thumbStates[i] === "1") c.appendChild(thumbImg(i));
    frag.appendChild(c);
    return c;
  });
  $("gridCells").appendChild(frag);
  window.addEventListener("resize", () => { gridColsCache = 0; });

  // Tell the sweep which region the viewport is showing so blank areas the
  // user scrolls to fill first.
  let hintTimer = null;
  $("grid").addEventListener("scroll", () => {
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => {
      const g = $("grid");
      const rowH = cells[0].offsetHeight + 4;
      const idx = Math.min(shots.length - 1,
        Math.max(0, Math.round((g.scrollTop + g.clientHeight / 2) / rowH) * gridCols()));
      api("/api/thumbhint", { index: idx }).catch(() => {});
    }, 250);
  }, { passive: true });
}

function gridCols() {
  if (gridColsCache) return gridColsCache;
  if (!cells.length) return 1;
  const top = cells[0].offsetTop;
  let n = 0;
  while (n < cells.length && cells[n].offsetTop === top) n++;
  return (gridColsCache = Math.max(1, n));
}

function toggleGrid(open = !gridOpen) {
  if (open) buildGrid();
  gridOpen = open;
  $("grid").classList.toggle("show", open);
  $("gridBtn").classList.toggle("active", open);
  gridColsCache = 0;
  if (open) {
    lastScrolledCursor = -1; // force one scroll-to-cursor on open
    decorate();
    if (cells[cursor]) cells[cursor].scrollIntoView({ block: "center" });
  } else {
    show(cursor, false); // mount the shot the grid landed on
  }
}
$("gridBtn").onclick = () => toggleGrid();

/* nav moves the cursor. In the grid it only updates selection/decorations —
   full-size pulls would be wasteful while skimming thumbnails; the viewer
   path (show) does the heavy lifting. */
function nav(i, push = true) {
  if (!gridOpen) { show(i, push); return; }
  if (i < 0 || i >= shots.length) return;
  cursor = i;
  decorate();
  if (push) api("/api/cursor", { index: i }).catch(() => {});
}

const TICK_PITCH = 26; // 24px tick + 2px gap; positions computed, never read

function buildStrip() {
  const strip = $("strip");
  strip.innerHTML = "";
  ticks = shots.map((s, i) => {
    const b = document.createElement("button");
    b.className = "tick" + (s.kind === "video" ? " video" : "");
    b.title = s.folder + "/" + s.base;
    b.onclick = () => show(i);
    strip.appendChild(b);
    return b;
  });
  const cur = document.createElement("div");
  cur.id = "stripCursor";
  strip.appendChild(cur);
}

/* ── render ───────────────────────────────────────────────── */
function decorate() {
  const s = shots[cursor], d = decisions[s.id] || "";
  $("counter").innerHTML = "<b>" + String(cursor + 1).padStart(4, "0") + "</b>/" + String(shots.length).padStart(4, "0");
  const sz = humanSize(s.size);
  $("filename").innerHTML = '<span class="folder">' + s.folder + " / </span>" + s.base +
    " <span class=\"folder\">" + Object.keys(s.files).sort().join("+") + (sz ? " · " + sz : "") + "</span>";
  $("stage").classList.toggle("keep", d === "keep");
  $("stage").classList.toggle("reject", d === "reject");
  const badge = $("badge");
  badge.className = "badge " + d;
  badge.textContent = d.toUpperCase();

  let keep = 0, rej = 0;
  for (const id in decisions) decisions[id] === "keep" ? keep++ : rej++;
  $("cKeep").textContent = "K " + keep;
  $("cReject").textContent = "X " + rej;
  $("cUndecided").textContent = "· " + (shots.length - keep - rej);

  // Incremental class updates: rewriting 19k classNames per keystroke costs
  // ~60 ms of style recalc and was the residual per-navigation lag.
  ticks.forEach((t, i) => {
    const id = shots[i].id;
    const cls = "tick"
      + (shots[i].kind === "video" ? " video" : "")
      + (decisions[id] ? " " + decisions[id] : "")
      + (decodedIds.has(id) ? " decoded" : (fetchStates[id] === "ready" ? " buffered" : ""));
    if (t.__cls !== cls) { t.className = cls; t.__cls = cls; }
  });
  // Move the cursor overlay and center the strip — pure arithmetic, no DOM
  // reads that would force a layout flush over 19k dirtied ticks.
  const sc = $("stripCursor");
  if (sc) sc.style.transform = "translateX(" + (cursor * TICK_PITCH) + "px)";
  if (cursor !== lastScrolledCursor) {
    const strip = $("strip");
    strip.scrollLeft = Math.max(0, 14 + cursor * TICK_PITCH + 12 - strip.clientWidth / 2);
  }

  if (gridOpen && cells.length) {
    cells.forEach((c, i) => {
      const id = shots[i].id;
      const cls = "cell"
        + (shots[i].kind === "video" ? " video" : "")
        + (decisions[id] ? " " + decisions[id] : "")
        + (i === cursor ? " current" : "");
      if (c.__cls !== cls) { c.className = cls; c.__cls = cls; }
    });
    if (cursor !== lastScrolledCursor && cells[cursor]) {
      cells[cursor].scrollIntoView({ block: "nearest" });
    }
  }
  lastScrolledCursor = cursor;
}

let overlayTimer = null, lastScrolledCursor = -1;
function show(i, pushCursor = true) {
  if (i < 0 || i >= shots.length) return;
  cursor = i;
  const s = shots[i];
  clearTimeout(overlayTimer);
  $("ovErr").textContent = "";
  $("overlay").classList.remove("show");

  if (s.kind === "video") {
    viewer.full = null; viewer.fitBm = null; // pooled bitmaps stay alive; canvas goes dark under the video
    $("stage").classList.remove("zoomed");
    $("zoomtag").style.display = "none";
    scheduleDraw();
    renderVideo(s);
  } else {
    $("view").replaceChildren(); // drop any video element
    const entry = entryFor(s.id, true);
    if (entry.status === "ready") {
      // Bitmaps in hand: one blit — the swap is atomic and immune to
      // browser decode-cache behavior.
      $("overlay").classList.remove("show");
      mountEntry(entry);
    } else {
      overlayTimer = setTimeout(() => {
        if (shots[cursor].id !== s.id) return;
        $("ovMsg").textContent = "BUFFERING " + s.base;
        $("overlay").classList.add("show");
      }, 250);
      entry.promise.then(en => {
        if (shots[cursor].id !== s.id) return;
        clearTimeout(overlayTimer);
        $("overlay").classList.remove("show");
        mountEntry(en);
      }).catch(() => {
        if (shots[cursor].id !== s.id) return;
        clearTimeout(overlayTimer);
        $("ovMsg").textContent = "BUFFERING " + s.base;
        $("ovErr").textContent = "transfer failed — retrying automatically (R to retry now)";
        $("overlay").classList.add("show");
        setTimeout(() => {
          if (shots[cursor].id !== s.id) return;
          pool.delete(s.id);
          show(cursor, false); // re-request; the server retries with backoff
        }, 3000);
      });
    }
  }
  decorate();
  preload();
  prunePool();
  if (pushCursor) api("/api/cursor", { index: i }).catch(() => {});
}

/* Videos stream directly on the dir backend; on the cli backend they must be
   pulled to the buffer first, and only on an explicit keypress so navigating
   past a video never accidentally transfers gigabytes. */
function renderVideo(s) {
  const state = fetchStates[s.id];
  const playable = videoDirect || state === "ready";
  if (playable) {
    $("overlay").classList.remove("show");
    const v = document.createElement("video");
    v.controls = true; v.preload = "metadata";
    v.src = vidURL(s.id);
    $("view").replaceChildren(v);
    return;
  }
  $("overlay").classList.add("show");
  if (state === "fetching") {
    $("ovMsg").textContent = "PULLING VIDEO " + s.base + " FROM CAMERA";
    $("ovErr").textContent = "this can take a while for long clips";
  } else if (state === "failed") {
    $("ovMsg").textContent = "PULL FAILED";
    $("ovErr").textContent = s.base + " could not be pulled — press R to retry";
  } else {
    $("ovMsg").textContent = "VIDEO NOT BUFFERED";
    $("ovErr").textContent = "press L to pull " + s.base + " from the camera";
  }
}

function loadVideo() {
  const s = shots[cursor];
  if (!s || s.kind !== "video" || videoDirect) return;
  api("/api/loadvideo", { id: s.id }).then(() => show(cursor, false)).catch(e => toast(e.message));
}

/* ── decisions ────────────────────────────────────────────── */
async function decide(decision) {
  const s = shots[cursor];
  if (!s) return;
  undoStack.push({ index: cursor, prev: decisions[s.id] || "" });
  if (decision) decisions[s.id] = decision; else delete decisions[s.id];
  decorate();
  try { await api("/api/decision", { id: s.id, decision: decision || "clear" }); }
  catch (e) { toast("save failed: " + e.message); }
  if (decision && cursor < shots.length - 1) nav(cursor + 1);
}

async function undo() {
  const u = undoStack.pop();
  if (!u) { toast("nothing to undo"); return; }
  const s = shots[u.index];
  if (u.prev) decisions[s.id] = u.prev; else delete decisions[s.id];
  try { await api("/api/decision", { id: s.id, decision: u.prev || "clear" }); }
  catch (e) { toast("save failed: " + e.message); }
  nav(u.index);
}

function nextUndecided() {
  for (let d = 1; d <= shots.length; d++) {
    const i = (cursor + d) % shots.length;
    if (!decisions[shots[i].id]) { nav(i); return; }
  }
  toast("no undecided shots left");
}

/* ── status poll ──────────────────────────────────────────── */
async function poll() {
  try {
    const st = await api("/api/status");
    fetchStates = st.fetch || {};
    importStatus = st.import || {};
    decorate();
    renderImport();
    preload();
    // A pending video pull finished (or progressed): refresh the placeholder.
    const s = shots[cursor];
    if (s && s.kind === "video" && !videoDirect && !$("view").querySelector("video")) {
      renderVideo(s);
    }
  } catch (e) { /* transient */ }
}

/* ── import panel ─────────────────────────────────────────── */
function importSummary() {
  let nShots = 0, nFiles = 0, size = 0;
  for (const s of shots) {
    if (decisions[s.id] !== "keep") continue;
    nShots++; nFiles += Object.keys(s.files).length; size += s.size;
  }
  $("impShots").textContent = nShots;
  $("impFiles").textContent = nFiles;
  $("impSize").textContent = humanSize(size) || "—";
}
function openImport() { importSummary(); renderImport(); $("importPanel").classList.add("show"); }
function closeImport() { $("importPanel").classList.remove("show"); }
function renderImport() {
  const p = importStatus || {};
  const box = $("impProgress");
  const active = p.running || p.phase === "done" || p.phase === "error";
  box.classList.toggle("show", !!active);
  if (!active) return;
  $("impPhase").textContent = (p.phase || "").toUpperCase() + (p.running ? "" : " — FINISHED");
  $("impCount").textContent = (p.done || 0) + " / " + (p.total || 0);
  $("impBar").style.width = p.total ? (100 * p.done / p.total) + "%" : "0";
  $("impError").textContent = p.error || "";
  $("impGo").disabled = !!p.running;
}
$("importBtn").onclick = openImport;
$("impClose").onclick = closeImport;
$("impGo").onclick = async () => {
  try {
    await api("/api/import", { dest: $("impDest").value.trim(), album: $("impAlbum").value.trim() });
    toast("import started");
  } catch (e) { toast(e.message.trim()); }
};

/* ── keys ─────────────────────────────────────────────────── */
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") {
    if (e.key === "Escape") closeImport();
    return;
  }
  const k = e.key.toLowerCase();
  if (["arrowleft", "arrowright", " "].includes(k) || (gridOpen && ["arrowup", "arrowdown"].includes(k))) e.preventDefault();
  switch (k) {
    case "arrowright": nav(cursor + 1); break;
    case "arrowleft": case "h": nav(cursor - 1); break;
    case "arrowup": if (gridOpen) nav(Math.max(0, cursor - gridCols())); break;
    case "arrowdown": if (gridOpen) nav(Math.min(shots.length - 1, cursor + gridCols())); break;
    case "home": nav(0); break;
    case "end": nav(shots.length - 1); break;
    case "k": decide("keep"); break;
    case "x": decide("reject"); break;
    case "c": decide(""); break;
    case "u": undo(); break;
    case "g": nextUndecided(); break;
    case "t": toggleGrid(); break;
    case "enter": if (gridOpen) toggleGrid(false); break;
    case "l": if (shots[cursor] && shots[cursor].kind === "video") { loadVideo(); break; } nav(cursor + 1); break;
    case "z": case " ": if (!gridOpen) toggleZoom(); break;
    case "r": {
      const s = shots[cursor];
      if (s && !gridOpen) {
        const e = pool.get(s.id);
        if (e && e.full && e.full !== viewer.full) e.full.close();
        if (e && e.fitBm && e.fitBm !== viewer.fitBm) e.fitBm.close();
        pool.delete(s.id);
        api("/api/retry", { id: s.id }).then(() => show(cursor, false)).catch(() => {});
      }
      break;
    }
    case "i": openImport(); break;
    case "escape":
      if (zoomedIn() && !gridOpen) { const [sw, sh] = stageSize(); zoomAt(sw / 2, sh / 2, viewer.fit); }
      else if (gridOpen) toggleGrid(false);
      else closeImport();
      break;
  }
});

boot().catch(e => toast("failed to load: " + e.message));
</script>
</body>
</html>
