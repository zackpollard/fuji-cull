# Self-hosted fuji-cull sync relay.
#
#   1. Set a strong key:  echo "SYNC_API_KEY=$(openssl rand -hex 32)" > .env
#   2. docker compose -f deploy/sync/compose.yml up -d --build
#   3. Point each device's Settings -> Sync at http://<host>:8777 with that key.
#
# Put it behind your own TLS reverse proxy (Caddy/nginx/Traefik) for anything
# beyond a trusted LAN — the API key is the only credential.
services:
  fuji-sync:
    build:
      context: ../..
      dockerfile: deploy/sync/Dockerfile
    image: fuji-sync:latest
    restart: unless-stopped
    ports:
      - "8777:8777"
    environment:
      SYNC_API_KEY: ${SYNC_API_KEY:?set SYNC_API_KEY in deploy/sync/.env}
      SYNC_LISTEN: ":8777"
      SYNC_DB: "/data/sync.db"
    volumes:
      - fuji-sync-data:/data
    healthcheck:
      test: ["CMD", "/fuji-sync", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  fuji-sync-data:
